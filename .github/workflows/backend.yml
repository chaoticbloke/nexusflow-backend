name: NexusFlow Backend CI

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: docker build -t nexusflow-backend:latest .

      - name: Tag Docker Image
        run: |
          docker tag nexusflow-backend:latest \
          183054028787.dkr.ecr.ap-south-1.amazonaws.com/nexusflow-backend:latest

      - name: Push Docker Image
        run: |
          docker push \
          183054028787.dkr.ecr.ap-south-1.amazonaws.com/nexusflow-backend:latest

  deploy:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/apps/nexusflow-infra
  
            aws ecr get-login-password --region ap-south-1 | \
            docker login \
            --username AWS \
            --password-stdin \
            183054028787.dkr.ecr.ap-south-1.amazonaws.com
  
            docker compose pull backend
            docker compose up -d backend
  
            docker image prune -f