  app:
    build: .
    container_name: nexusflow-backend

    restart: unless-stopped

    ports:
      - "8080:8080"

    depends_on:
      - postgres
      - redis
#      - kafka

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nexusflow
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin

volumes:
  postgres_data: