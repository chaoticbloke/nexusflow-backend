services:

  postgres:
    image: postgres:17
    container_name: nexusflow-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: nexusflow
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: nexusflow-redis

    ports:
      - "6379:6379"
